name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-and-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Run unit and end-to-end tests
        run: go test ./...

      - name: Run benchmark summary
        run: go run ./cmd/flogo-agent benchmark --bench-root ./testdata/benchmarks --mode review > benchmark-summary.json

      - name: Publish benchmark summary
        run: |
          python - <<'PY'
          import json, os

          with open("benchmark-summary.json", "r", encoding="utf-8") as handle:
              summary = json.load(handle)

          def pct(value):
              return f"{value * 100:.1f}%"

          lines = [
              "## Benchmark Summary",
              "",
              f"- Fixtures: {summary.get('total', 0)}",
              f"- Validation pass rate: {pct(summary.get('validationPassRate', 0.0))}",
              f"- Applied rate: {pct(summary.get('appliedRate', 0.0))}",
              f"- Ready-for-review rate: {pct(summary.get('readyRate', 0.0))}",
              f"- Build success rate: {pct(summary.get('buildSuccessRate', 0.0))} ({summary.get('buildSuccessFixtures', 0)}/{summary.get('fixturesWithBuild', 0)} attempted fixtures)",
              f"- Test pass rate: {pct(summary.get('testPassRate', 0.0))} ({summary.get('passedTests', 0)}/{summary.get('nonSkippedTests', 0)} non-skipped tests)",
              "",
              "### Outcomes",
          ]

          for outcome, count in sorted(summary.get("outcomes", {}).items()):
              lines.append(f"- {outcome}: {count}")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Print benchmark summary
        run: cat benchmark-summary.json

  flogo-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Install Flogo CLI
        run: |
          go install github.com/project-flogo/cli/...@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Flogo CLI
        run: flogo help >/dev/null

      - name: Run Flogo integration tests
        env:
          FLOGO_INTEGRATION: "1"
        run: go test -tags=integration ./internal/tools -run TestFlogoCLIIntegrationCreateAndBuild -v

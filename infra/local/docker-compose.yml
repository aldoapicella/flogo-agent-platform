services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: flogo
      POSTGRES_PASSWORD: flogo
      POSTGRES_DB: flogo_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"

  control-plane:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm db:generate &&
      pnpm --filter @flogo-agent/control-plane dev"
    environment:
      CONTROL_PLANE_PORT: 3001
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://flogo:flogo@postgres:5432/flogo_agent?schema=public
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  runner-worker:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm --filter @flogo-agent/runner-worker dev"
    environment:
      REDIS_URL: redis://redis:6379
      RUNNER_WORKER_CONCURRENCY: 2
      RUNNER_EXECUTION_MODE: local-docker
    depends_on:
      - redis

  web-console:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm --filter @flogo-agent/web-console dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - control-plane

volumes:
  postgres-data:


services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: flogo
      POSTGRES_PASSWORD: flogo
      POSTGRES_DB: flogo_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"

  control-plane:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm db:generate &&
      pnpm db:push &&
      pnpm --filter @flogo-agent/control-plane dev"
    environment:
      CONTROL_PLANE_PORT: 3001
      ORCHESTRATOR_BASE_URL: http://orchestrator:7071/api
      DATABASE_URL: postgresql://flogo:flogo@postgres:5432/flogo_agent?schema=public
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      APP_ANALYSIS_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true
      APP_ANALYSIS_BLOB_ENDPOINT: http://azurite:10000/devstoreaccount1
      APP_ANALYSIS_STORAGE_CONTAINER: flogo-analysis
      AZURITE_CONNECTION_STRING: UseDevelopmentStorage=true
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - azurite
      - orchestrator

  orchestrator:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm --filter @flogo-agent/orchestrator dev"
    environment:
      ORCHESTRATOR_PORT: 7071
      RUNNER_WORKER_BASE_URL: http://runner-worker:3010
      CONTROL_PLANE_INTERNAL_URL: http://control-plane:3001/v1
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      DURABLE_STORAGE_PROVIDER_TYPE: azureStorage
      DURABLE_BACKEND_CONNECTION_NAME: AzureWebJobsStorage
      DURABLE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true
      AzureWebJobsStorage: UseDevelopmentStorage=true
      AZURITE_CONNECTION_STRING: UseDevelopmentStorage=true
    ports:
      - "7071:7071"
    depends_on:
      - runner-worker
      - azurite

  runner-worker:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm --filter @flogo-agent/runner-worker dev"
    environment:
      RUNNER_WORKER_PORT: 3010
      RUNNER_EXECUTION_MODE: local-process
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      RUNNER_INVENTORY_JOB_TEMPLATE_NAME: flogo-build-job
      RUNNER_GOVERNANCE_JOB_TEMPLATE_NAME: flogo-build-job
      RUNNER_COMPOSITION_COMPARE_JOB_TEMPLATE_NAME: flogo-build-job
    ports:
      - "3010:3010"
    depends_on:
      - azurite

  web-console:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install &&
      pnpm --filter @flogo-agent/web-console dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - control-plane

volumes:
  postgres-data:
